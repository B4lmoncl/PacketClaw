services:
  aethergate:
    # Wie QuestHall: direkt aus dem Repo-Checkout bauen — kein Registry-Login nötig
    build: .
    container_name: aethergate
    restart: unless-stopped
    ports:
      # Default: nur localhost (hinter Reverse Proxy).
      # Ohne DNS/Proxy direkt über die Public IP: AETHERGATE_BIND=0.0.0.0 setzen
      # (z. B. in einer .env-Datei neben dieser compose.yml).
      - '${AETHERGATE_BIND:-127.0.0.1}:${AETHERGATE_PORT:-8090}:8080'
    environment:
      - NODE_ENV=production
    volumes:
      # Accounts + Spielstände — überlebt Rebuilds und Container-Neuanlagen
      - aethergate-data:/app/data
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:8080/api/health']
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  aethergate-data:

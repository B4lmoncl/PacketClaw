services:
  aethergate:
    image: ghcr.io/b4lmoncl/packetclaw:latest
    # Alternativ lokal bauen:
    # build: .
    container_name: aethergate
    restart: unless-stopped
    ports:
      # nur localhost — TLS und Subdomain macht der Host-Reverse-Proxy (wie QuestHall)
      - '127.0.0.1:${AETHERGATE_PORT:-8090}:8080'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:8080/']
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    # --- Traefik statt Host-nginx? Labels einkommentieren und ports entfernen ---
    # labels:
    #   - traefik.enable=true
    #   - traefik.http.routers.aethergate.rule=Host(`aethergate.example.tld`)
    #   - traefik.http.routers.aethergate.entrypoints=websecure

# AetherGate — Offline-SPA hinter Reverse Proxy (TLS terminiert der Host-Proxy)
server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json application/manifest+json image/svg+xml;
    gzip_min_length 1024;

    # Security-Header. CSP fuer eine Offline-SPA ohne externe Quellen:
    # Fonts sind lokal gebundelt, keine CDNs; Web Audio braucht kein connect-src.
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header X-Frame-Options "DENY" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; manifest-src 'self'; worker-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;

    # Gehashte Assets: unveraenderlich cachen
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Service Worker + index.html: immer frisch (Updates via autoUpdate-SW)
    location = /sw.js {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # SPA-Fallback
    location / {
        try_files $uri /index.html;
    }
}
